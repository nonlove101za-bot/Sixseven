/* ===============================

================================ */

/* ===============================

================================ */

position:fixed;
inset:0;
pointer-events:none;
z-index:0;
}

.a1,.a2,.a3,.a4,.a5{
position:absolute;
border-radius:50%;
filter:blur(10px);
}

.a1{
width:800px;
height:800px;
top:-250px;
left:-150px;
background:radial-gradient(circle,rgba(80,80,80,.28),transparent 70%);
animation:float1 10s infinite alternate ease-in-out;
}

.a2{
width:650px;
height:650px;
top:-100px;
left:250px;
background:radial-gradient(circle,rgba(50,50,50,.22),transparent 70%);
animation:float2 12s infinite alternate ease-in-out;
}

.a3{
width:550px;
height:550px;
bottom:-180px;
right:50px;
background:radial-gradient(circle,rgba(120,120,120,.18),transparent 70%);
animation:float3 12s infinite alternate ease-in-out;
}

.a4{
width:400px;
height:400px;
top:100px;
right:-50px;
background:radial-gradient(circle,rgba(100,100,100,.15),transparent 70%);
animation:float1 8s infinite alternate-reverse ease-in-out;
}

.a5{
width:900px;
height:320px;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:radial-gradient(circle,rgba(180,180,180,.07),transparent 70%);
animation:float2 16s infinite alternate ease-in-out;
}

@keyframes float1{
from{transform:translate(0,0) scale(1);}
to{transform:translate(40px,30px) scale(1.1);}
}

@keyframes float2{
from{transform:translate(0,0) scale(1);}
to{transform:translate(-30px,40px) scale(.95);}
}

@keyframes float3{
from{transform:translate(0,0) scale(1);}
to{transform:translate(-20px,-40px) scale(1.15);}
}

#stars{
position:fixed;
inset:0;
pointer-events:none;
z-index:1;
}

.star{
position:absolute;
background:#fff;
border-radius:50%;
animation:twinkle var(--d,3s) infinite ease-in-out;
}

@keyframes twinkle{
0%,100%{opacity:.25;}
50%{opacity:.04;}
}

/* ===============================
   PARTICLES CANVAS
================================ */
#particle-canvas{
position:fixed;
inset:0;
pointer-events:none;
z-index:2;
}

/* ===============================
   SNOWFLAKE 67
================================ */
.snowflake{
position:fixed;
top:-40px;
pointer-events:none;
z-index:3;
font-family:'Outfit',sans-serif;
font-weight:800;
color:rgba(255,255,255,.55);
text-shadow:0 0 8px rgba(255,255,255,.3);
animation:snowfall linear forwards;
user-select:none;
}

@keyframes snowfall{
0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}
10%{
opacity:1;
}
90%{
opacity:.6;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

/* ===============================
   MUSIC BAR
================================ */
.music-bar{
position:fixed;
top:0;
left:0;
right:0;
height:55px;
background:rgba(8,8,8,.85);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,.06);
display:flex;
align-items:center;
padding:0 24px;
gap:14px;
z-index:999;
}

.music-art{
width:34px;
height:34px;
border-radius:10px;
background:linear-gradient(135deg,#2a2a2a,#555555);
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-size:16px;
flex-shrink:0;
}

.music-info{
flex:1;
min-width:0;
}

.music-title{
font-size:12px;
font-weight:600;
color:#ddd;

overflow:hidden;
text-overflow:ellipsis;
}

.music-sub{
font-size:10px;
color:rgba(255,255,255,.25);
}

.music-controls{
display:flex;
align-items:center;
gap:6px;
}

.ctrl-btn{
width:32px;
height:32px;
border:none;
border-radius:50%;
background:none;
cursor:pointer;
color:rgba(255,255,255,.45);
transition:.2s;
}

.ctrl-btn:hover{
background:rgba(255,255,255,.06);
color:#ccc;
}

.play-btn{
background:linear-gradient(135deg,#2a2a2a,#666666);
color:#fff;
}

.music-progress{
display:flex;
align-items:center;
gap:6px;
max-width:180px;
width:100%;
}

.music-time{
font-size:10px;
color:rgba(255,255,255,.25);
min-width:30px;
}

.prog-bar{
flex:1;
height:3px;
background:rgba(255,255,255,.08);
border-radius:20px;
cursor:pointer;
overflow:hidden;
}

.prog-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#888,#ddd);
}

.vol-slider{
width:65px;
height:3px;
appearance:none;
background:rgba(255,255,255,.12);
border-radius:20px;
}

.vol-slider::-webkit-slider-thumb{
appearance:none;
width:10px;
height:10px;
border-radius:50%;
background:#aaa;
cursor:pointer;
}

  const size = Math.random() * 2.5 + 0.5;
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height,
    size: size,
    speed: Math.random() * 0.6 + 0.2,
    opacity: Math.random() * 0.55 + 0.1,
    color: randomGray(),
    glow: Math.random() > 0.65,
    drift: (Math.random() - 0.5) * 0.3,
    twinkleSpeed: Math.random() * 0.02 + 0.005,
    twinkleOffset: Math.random() * Math.PI * 2,
  };
}

for(let i = 0; i < PARTICLE_COUNT; i++){
  const p = createParticle();
  p.y = Math.random() * canvas.height;
  particles.push(p);
}

let frame = 0;

function animate(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  frame++;

  for(let i = 0; i < particles.length; i++){
    const p = particles[i];
    p.y += p.speed;
    p.x += p.drift;

    const twinkle = 0.5 + 0.5 * Math.sin(frame * p.twinkleSpeed + p.twinkleOffset);
    const alpha = p.opacity * (0.6 + 0.4 * twinkle);

    if(p.glow){
      const glowSize = p.size * 4;
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowSize);
      grad.addColorStop(0, `rgba(220,220,220,${alpha * 0.45})`);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(p.x, p.y, glowSize, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color.replace('rgb', 'rgba').replace(')', `,${alpha})`);
    ctx.fill();

    if(p.y > canvas.height + 10 || p.x < -10 || p.x > canvas.width + 10){
      particles[i] = createParticle();
    }
  }

  requestAnimationFrame(animate);
}

animate();
})();

// ===============================
// MEMBER RENDER
// ===============================
function gradientFor(name){

const g=[
'linear-gradient(135deg,#1a1a1a,#444)',
'linear-gradient(135deg,#222,#555)',
'linear-gradient(135deg,#1e1e1e,#3a3a3a)',
'linear-gradient(135deg,#2a2a2a,#606060)',
'linear-gradient(135deg,#181818,#4a4a4a)'
];

let h=0;

for(const c of name)
h=(h*31+c.charCodeAt(0))%g.length;

return g[Math.abs(h)];
}

function initials(n){
return n
.split(' ')
.map(w=>w[0]||'')
.join('')
.toUpperCase()
.slice(0,2)||'?';
}

function render(list){

const grid=document.getElementById('members-grid');

document.getElementById('members-count')
.textContent=MEMBERS.length+' คน';

grid.innerHTML=list.map(m=>{

const avt=m.avatar
? `<img src="${m.avatar}">`
: `<span>${initials(m.name)}</span>`;       

const fb=m.fb
? `<a class="member-fb"
href="${m.fb}"
target="_blank">
Facebook
</a>`
: `<div class="member-no-fb">
ไม่มี Facebook
</div>`;

return `
<div class="member-card">

<div class="member-avatar"
style="background:${m.avatar?'transparent':gradientFor(m.name)}">
${avt}
</div>

<div class="member-name">
${m.name}
</div>

<div class="member-role">
${m.role||''}
</div>

${fb}

</div>
`;

}).join('');
}

render(MEMBERS);

document.getElementById('search-input')
.oninput=function(){

const q=this.value.toLowerCase();

render(
q
? MEMBERS.filter(m=>
m.name.toLowerCase().includes(q) ||
(m.role||'').toLowerCase().includes(q)
)
: MEMBERS
);
};

// MUSIC
// ===============================
const audio=document.getElementById('audio-player');

let playlist=SITE_CONFIG.music;
let cur=0;
let playing=false;

audio.volume=.7;

function fmt(s){

if(isNaN(s)) return '0:00';

const m=Math.floor(s/60);

const ss=Math.floor(s%60);

return `${m}:${ss.toString().padStart(2,'0')}`;
}

function loadTrack(i){

if(!playlist.length) return;

audio.src=playlist[i].url;

document.getElementById('music-title')
.textContent=playlist[i].name;

document.getElementById('prog-fill')
.style.width='0%';

document.getElementById('time-cur')
.textContent='0:00';
}

if(playlist.length){

loadTrack(0);

audio.autoplay = true;

audio.play().then(()=>{

playing = true;

document.getElementById('btn-play')
.innerHTML='⏸';

}).catch(()=>{

document.addEventListener('click', ()=>{

audio.play();

playing = true;

document.getElementById('btn-play')
.innerHTML='⏸';

}, { once:true });

});

}
document.getElementById('btn-play').onclick=()=>{

if(!playlist.length) return;

if(playing){

audio.pause();

playing=false;

document.getElementById('btn-play')
.innerHTML='▶';

}else{

audio.play();

playing=true;

document.getElementById('btn-play')
.innerHTML='⏸';
}
};

document.getElementById('btn-next').onclick=()=>{   

if(!playlist.length) return;

cur=(cur+1)%playlist.length;

loadTrack(cur);

audio.play();
};

document.getElementById('btn-prev').onclick=()=>{

if(!playlist.length) return;

cur=(cur-1+playlist.length)%playlist.length;

loadTrack(cur);

audio.play();
};

audio.ontimeupdate=()=>{

if(!audio.duration) return;

document.getElementById('prog-fill')
.style.width=
(audio.currentTime/audio.duration*100)+'%';

document.getElementById('time-cur')
.textContent=fmt(audio.currentTime);

document.getElementById('time-dur')
.textContent=fmt(audio.duration);
};

audio.onended=()=>{
        
cur=(cur+1)%playlist.length;

loadTrack(cur);

audio.play();
};

document.getElementById('prog-bar')
.onclick=function(e){

if(!audio.duration) return;

const r=this.getBoundingClientRect();

audio.currentTime=
((e.clientX-r.left)/r.width)*audio.duration;
};

document.getElementById('vol-slider')
.oninput=function(){

audio.volume=this.value;
